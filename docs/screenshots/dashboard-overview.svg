<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">EcoDispatch dashboard overview</title>
  <desc id="desc">Illustrative dashboard preview showing controls, KPIs, and charts for the EcoDispatch prototype.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#18212f"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="28" y="24" width="1224" height="672" rx="24" fill="#0b1220" stroke="#334155"/>

  <rect x="52" y="52" width="240" height="616" rx="18" fill="url(#panel)" stroke="#334155"/>
  <text x="76" y="92" fill="#e5e7eb" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Configuration</text>
  <rect x="76" y="120" width="192" height="6" rx="3" fill="url(#accent)"/>

  <text x="76" y="165" fill="#93c5fd" font-family="Arial, Helvetica, sans-serif" font-size="18">Location</text>
  <rect x="76" y="178" width="192" height="42" rx="10" fill="#111827" stroke="#475569"/>
  <rect x="76" y="232" width="192" height="42" rx="10" fill="#111827" stroke="#475569"/>

  <text x="76" y="318" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="18">System Parameters</text>
  <rect x="76" y="334" width="192" height="16" rx="8" fill="#1e293b"/>
  <rect x="76" y="378" width="192" height="16" rx="8" fill="#1e293b"/>
  <rect x="76" y="422" width="192" height="16" rx="8" fill="#1e293b"/>
  <rect x="76" y="334" width="138" height="16" rx="8" fill="#38bdf8"/>
  <rect x="76" y="378" width="114" height="16" rx="8" fill="#f59e0b"/>
  <rect x="76" y="422" width="96" height="16" rx="8" fill="#22c55e"/>

  <text x="76" y="485" fill="#fde68a" font-family="Arial, Helvetica, sans-serif" font-size="18">Simulation</text>
  <rect x="76" y="498" width="192" height="42" rx="10" fill="#111827" stroke="#475569"/>
  <rect x="76" y="562" width="92" height="40" rx="12" fill="#2563eb"/>
  <rect x="176" y="562" width="92" height="40" rx="12" fill="#059669"/>
  <text x="101" y="588" fill="#eff6ff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Run</text>
  <text x="190" y="588" fill="#ecfdf5" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Compare</text>

  <text x="326" y="86" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">EcoDispatch Dashboard</text>
  <text x="326" y="116" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="18">Representative interface for scenario analysis and strategy comparison</text>

  <rect x="326" y="144" width="212" height="112" rx="18" fill="url(#panel)" stroke="#334155"/>
  <rect x="556" y="144" width="212" height="112" rx="18" fill="url(#panel)" stroke="#334155"/>
  <rect x="786" y="144" width="212" height="112" rx="18" fill="url(#panel)" stroke="#334155"/>
  <rect x="1016" y="144" width="212" height="112" rx="18" fill="url(#panel)" stroke="#334155"/>

  <text x="348" y="182" fill="#93c5fd" font-family="Arial, Helvetica, sans-serif" font-size="16">Total Emissions</text>
  <text x="348" y="224" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">4,774 kgCO2</text>
  <text x="578" y="182" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="16">Total Cost</text>
  <text x="578" y="224" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">$1,386</text>
  <text x="808" y="182" fill="#fde68a" font-family="Arial, Helvetica, sans-serif" font-size="16">Peak Grid Draw</text>
  <text x="808" y="224" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">858 kW</text>
  <text x="1038" y="182" fill="#c4b5fd" font-family="Arial, Helvetica, sans-serif" font-size="16">Renewable Energy</text>
  <text x="1038" y="224" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">25.6%</text>

  <rect x="326" y="284" width="608" height="362" rx="20" fill="url(#panel)" stroke="#334155"/>
  <text x="352" y="322" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Energy Dispatch Over Time</text>
  <polyline points="360,590 360,360 390,360 390,590" fill="#475569" opacity="0.95"/>
  <polyline points="390,590 390,430 470,430 470,590" fill="#facc15" opacity="0.9"/>
  <polyline points="470,590 470,470 560,470 560,590" fill="#38bdf8" opacity="0.9"/>
  <polyline points="560,590 560,390 660,390 660,590" fill="#475569" opacity="0.95"/>
  <polyline points="660,590 660,340 760,340 760,590" fill="#facc15" opacity="0.9"/>
  <polyline points="760,590 760,505 900,505 900,590" fill="#38bdf8" opacity="0.9"/>
  <line x1="360" y1="590" x2="900" y2="590" stroke="#64748b"/>
  <line x1="360" y1="360" x2="360" y2="590" stroke="#64748b"/>

  <rect x="958" y="284" width="270" height="172" rx="20" fill="url(#panel)" stroke="#334155"/>
  <text x="982" y="322" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Battery SOC</text>
  <polyline points="980,410 1010,360 1050,372 1090,344 1130,356 1170,332 1200,340" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="980" y1="420" x2="1206" y2="420" stroke="#64748b"/>

  <rect x="958" y="474" width="270" height="172" rx="20" fill="url(#panel)" stroke="#334155"/>
  <text x="982" y="512" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Strategy Comparison</text>
  <rect x="984" y="604" width="28" height="18" fill="#6b7280"/>
  <rect x="1022" y="564" width="28" height="58" fill="#22c55e"/>
  <rect x="1060" y="584" width="28" height="38" fill="#3b82f6"/>
  <rect x="1098" y="576" width="28" height="46" fill="#f59e0b"/>
  <rect x="1136" y="532" width="28" height="90" fill="#8b5cf6"/>
  <line x1="976" y1="622" x2="1206" y2="622" stroke="#64748b"/>
</svg>
