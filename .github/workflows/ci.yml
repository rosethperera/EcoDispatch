name: EcoDispatch CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run demo script
      run: |
        python demo.py

    - name: Run basic tests
      run: |
        python -c "import sys; sys.path.append('src'); from ecodispatch.simulation import EcoDispatch; print('✅ Imports successful')"

    - name: Check Streamlit app
      run: |
        python -c "import streamlit; print('✅ Streamlit available')" || echo "⚠️  Streamlit not available in CI"